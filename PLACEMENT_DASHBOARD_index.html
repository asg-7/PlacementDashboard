<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Placement OS · KIIT 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    :root {
      /* Core palette — deep navy-black with electric accents */
      --bg0: #05080F;
      --bg1: #080D18;
      --bg2: #0C1220;
      --bg3: #111828;
      --bg4: #172032;
      --surface: #1A2438;
      --surface2: #1F2B3E;

      /* Borders */
      --border: rgba(255,255,255,.06);
      --border2: rgba(255,255,255,.1);
      --border3: rgba(255,255,255,.16);

      /* Accents */
      --electric: #00E5FF;      /* electric cyan - primary */
      --electric-dim: rgba(0,229,255,.1);
      --electric-glow: rgba(0,229,255,.3);
      --volt: #ADFF2F;          /* volt green - success */
      --volt-dim: rgba(173,255,47,.1);
      --amber: #FFB800;         /* amber - warning */
      --amber-dim: rgba(255,184,0,.1);
      --coral: #FF4757;         /* coral red - danger */
      --coral-dim: rgba(255,71,87,.1);
      --violet: #B04AFF;        /* violet - special */
      --violet-dim: rgba(176,74,255,.1);
      --rose: #FF2D6D;          /* rose - hot */
      --rose-dim: rgba(255,45,109,.1);

      /* Text */
      --t1: #F0F4FF;
      --t2: #8899BB;
      --t3: #445570;
      --t4: #2A3650;

      /* Type */
      --display: 'Syne', sans-serif;
      --mono: 'Space Mono', monospace;
      --body: 'DM Sans', sans-serif;

      /* Shape */
      --r: 12px;
      --rs: 8px;
      --rx: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg0);
      color: var(--t1);
      font-family: var(--body);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
      /* Subtle grid noise background */
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,.08) 0%, transparent 70%),
        linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
      background-size: auto, 40px 40px, 40px 40px;
      background-attachment: fixed;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 2px; }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .shell { display: flex; flex-direction: column; min-height: 100vh; }

    /* HEADER */
    .hdr {
      background: rgba(8,13,24,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 200;
      height: 58px;
    }

    .hdr::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--electric-glow), transparent);
      opacity: .6;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 30px; height: 30px;
      background: var(--electric);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--bg0);
      letter-spacing: -1px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--electric-glow);
    }

    .brand-text {}
    .brand-name {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -.3px;
      line-height: 1;
    }
    .brand-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--t3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .hdr-center {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #live-clock {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--t2);
      text-align: center;
      line-height: 1.5;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 8px;
    }

    .hdr-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* NAV */
    .nav {
      background: rgba(8,13,24,.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0;
      padding: 0 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .ntab {
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: .8px;
      color: var(--t3);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
      text-transform: uppercase;
      position: relative;
    }
    .ntab:hover { color: var(--t2); }
    .ntab.active {
      color: var(--electric);
      border-bottom-color: var(--electric);
    }
    .ntab.active::before {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: var(--electric);
      box-shadow: 0 0 8px var(--electric-glow);
      border-radius: 2px;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 28px;
      width: 100%;
      max-width: 1480px;
      margin: 0 auto;
    }

    /* ============================================================
       GRID
    ============================================================ */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .g5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--rx);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: all .3s cubic-bezier(.25,.46,.45,.94);
    }
    .card:hover {
      border-color: rgba(0,229,255,.3);
      background: rgba(12,18,32,.8);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,229,255,.08);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
    }

    .card-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .card-label {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      color: var(--t1);
      margin-top: 2px;
    }

    /* ============================================================
       METRIC CARDS — glassmorphic with glow
    ============================================================ */
    .metric {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--rx);
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: all .3s cubic-bezier(.25,.46,.45,.94);
    }
    .metric:hover {
      border-color: rgba(0,229,255,.4);
      background: rgba(12,18,32,.9);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,229,255,.1);
    }
    .metric::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
    }

    .metric-icon {
      font-size: 18px;
      margin-bottom: 12px;
      opacity: .7;
    }

    .metric-val {
      font-family: var(--display);
      font-size: 38px;
      font-weight: 800;
      color: var(--t1);
      line-height: 1;
      letter-spacing: -2px;
    }

    .metric-lbl {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .metric-sub {
      font-size: 12px;
      color: var(--t3);
      margin-top: 4px;
    }

    .metric-glow {
      position: absolute;
      bottom: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: .12;
      filter: blur(20px);
    }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: var(--rs);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--electric);
      color: var(--bg0);
      box-shadow: 0 0 16px var(--electric-dim);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width .6s, height .6s;
    }
    .btn-primary:hover::before {
      width: 300px;
      height: 300px;
    }
    .btn-primary:hover {
      background: #33EAFF;
      box-shadow: 0 0 24px var(--electric-glow), 0 4px 12px rgba(0,229,255,.3);
      transform: translateY(-2px);
    }
    .btn-primary:active {
      transform: translateY(0px);
      box-shadow: 0 0 16px var(--electric-glow);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--t2);
      border: 1px solid var(--border2);
      position: relative;
      transition: all .25s;
    }
    .btn-ghost:hover {
      color: var(--t1);
      border-color: var(--electric);
      background: rgba(0,229,255,.05);
      box-shadow: 0 0 12px rgba(0,229,255,.1);
      transform: translateY(-1px);
    }
    .btn-ghost:active {
      transform: translateY(0px);
    }

    .btn-danger {
      background: var(--coral-dim);
      color: var(--coral);
      border: 1px solid rgba(255,71,87,.2);
    }
    .btn-danger:hover {
      background: rgba(255,71,87,.2);
    }

    .btn-success {
      background: var(--volt-dim);
      color: var(--volt);
      border: 1px solid rgba(173,255,47,.2);
    }

    .btn-sm { padding: 5px 12px; font-size: 9px; }
    .btn-xs { padding: 3px 8px; font-size: 9px; }

    /* ============================================================
       BADGES
    ============================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .b-blue { background: rgba(0,229,255,.12); color: var(--electric); }
    .b-green { background: var(--volt-dim); color: var(--volt); }
    .b-amber { background: var(--amber-dim); color: var(--amber); }
    .b-red { background: var(--coral-dim); color: var(--coral); }
    .b-purple { background: var(--violet-dim); color: var(--violet); }
    .b-cyan { background: var(--electric-dim); color: var(--electric); }
    .b-gray { background: rgba(68,85,112,.2); color: var(--t2); }
    .b-rose { background: var(--rose-dim); color: var(--rose); }

    /* ============================================================
       INPUTS
    ============================================================ */
    input, select, textarea {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--rs);
      color: var(--t1);
      font-family: var(--body);
      font-size: 13px;
      padding: 9px 13px;
      outline: none;
      transition: all .15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--electric);
      box-shadow: 0 0 0 3px var(--electric-dim);
    }
    input::placeholder, textarea::placeholder { color: var(--t3); }
    select option { background: var(--bg2); color: var(--t1); }

    label {
      font-size: 10px;
      font-weight: 700;
      color: var(--t3);
      margin-bottom: 5px;
      display: block;
      font-family: var(--mono);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ============================================================
       PAGE HEADER
    ============================================================ */
    .ph {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .ph-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--electric);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .ph-title {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 800;
      color: var(--t1);
      letter-spacing: -1px;
      line-height: 1;
    }

    .ph-sub {
      font-size: 13px;
      color: var(--t3);
      margin-top: 4px;
    }

    /* ============================================================
       PROGRESS BAR
    ============================================================ */
    .pbar {
      height: 3px;
      background: rgba(255,255,255,.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .pfill {
      height: 100%;
      background: var(--electric);
      border-radius: 2px;
      transition: width .5s cubic-bezier(.25,.46,.45,.94);
      position: relative;
    }

    .pfill::after {
      content: '';
      position: absolute;
      right: 0; top: -1px; bottom: -1px;
      width: 8px;
      background: var(--electric);
      filter: blur(3px);
    }

    /* Thick progress bar variant */
    .pbar-lg {
      height: 6px;
      background: rgba(255,255,255,.06);
      border-radius: 3px;
      overflow: hidden;
    }

    /* ============================================================
       TABLE
    ============================================================ */
    .tw { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    th {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--t3);
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--bg3);
    }

    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child { border-radius: 0 8px 0 0; }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--t1);
      font-size: 13px;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,229,255,.02); }

    /* STATUS SELECT */
    .ss {
      appearance: none;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--t1);
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      min-width: 120px;
      transition: border-color .15s;
    }
    .ss:focus { border-color: var(--electric); outline: none; }

    /* ============================================================
       CHECKLIST
    ============================================================ */
    .chk-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      cursor: pointer;
      transition: all .18s;
      margin-bottom: 8px;
    }
    .chk-item:last-child { margin-bottom: 0; }
    .chk-item:hover { border-color: var(--border2); background: var(--surface); }
    .chk-item.done { opacity: .5; }
    .chk-item.done .chk-lbl { text-decoration: line-through; color: var(--t3); }

    .chk-box {
      width: 18px; height: 18px;
      border: 1.5px solid var(--border3);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      transition: all .18s;
    }
    .chk-item.done .chk-box {
      background: var(--volt);
      border-color: var(--volt);
      color: var(--bg0);
      box-shadow: 0 0 8px var(--volt-dim);
    }
    .chk-lbl { font-size: 13px; color: var(--t1); flex: 1; line-height: 1.4; }

    /* ============================================================
       CHECKPOINT PROGRESS
    ============================================================ */
    .cp-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 8px; }
    .cp {
      padding: 3px 7px;
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 700;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg4);
      color: var(--t3);
      cursor: pointer;
      transition: all .12s;
      letter-spacing: .3px;
    }
    .cp:hover { border-color: var(--electric); color: var(--electric); }
    .cp.active {
      background: var(--electric);
      border-color: var(--electric);
      color: var(--bg0);
      box-shadow: 0 0 8px var(--electric-glow);
    }
    .cp.filled { background: var(--electric-dim); border-color: var(--electric); color: var(--electric); }

    /* ============================================================
       SEARCH BAR
    ============================================================ */
    .sb { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .si {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--rs);
      color: var(--t1);
      font-size: 13px;
      padding: 9px 13px;
    }
    .si:focus { border-color: var(--electric); outline: none; box-shadow: 0 0 0 3px var(--electric-dim); }
    .si::placeholder { color: var(--t3); }

    /* ============================================================
       DISPLAY VALUES
    ============================================================ */
    .dv { font-size: 13px; color: var(--t1); line-height: 1.4; }
    .dv-sub { font-size: 11px; color: var(--t2); margin-top: 2px; }

    /* ============================================================
       DSA
    ============================================================ */
    .dsa-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .diff-e { color: var(--volt); }
    .diff-m { color: var(--amber); }
    .diff-h { color: var(--coral); }

    .topic-tag {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: .5px;
      background: var(--violet-dim);
      color: var(--violet);
      margin-right: 4px;
    }

    /* ============================================================
       MODAL
    ============================================================ */
    .moverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .mbox {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--rx);
      padding: 28px;
      width: 100%;
      max-width: 540px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(0,229,255,.08);
    }
    .mbox::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--electric), transparent);
      opacity: .5;
      border-radius: var(--rx) var(--rx) 0 0;
    }

    .mtitle {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 800;
      color: var(--t1);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      letter-spacing: -.3px;
    }

    .mclose {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--t3);
      cursor: pointer;
      font-size: 18px;
      width: 30px; height: 30px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .mclose:hover { color: var(--t1); border-color: var(--border3); }

    .m-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .modal-scroll {
      max-height: calc(88vh - 100px);
      overflow-y: auto;
      padding-right: 6px;
    }
    .modal-scroll::-webkit-scrollbar { width: 6px; }
    .modal-scroll::-webkit-scrollbar-track { background: transparent; }
    .modal-scroll::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 3px; }
    .modal-scroll::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    /* ============================================================
       HACKATHON CARDS
    ============================================================ */
    .hk-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--rx);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .hk-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .hk-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
    }

    .hk-name {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -.3px;
    }

    .hk-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .hk-det { font-size: 12px; color: var(--t2); font-family: var(--mono); }

    /* ============================================================
       PROJECT CARDS
    ============================================================ */
    .proj-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--rx);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all .2s;
    }
    .proj-card:hover { border-color: var(--border2); transform: translateY(-2px); }

    .proj-name {
      font-family: var(--display);
      font-size: 16px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -.3px;
    }

    .proj-desc { font-size: 13px; color: var(--t2); line-height: 1.5; }

    .tech-tag {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: .5px;
      background: rgba(0,229,255,.08);
      color: var(--electric);
      border: 1px solid rgba(0,229,255,.15);
      margin-right: 4px;
      margin-bottom: 4px;
    }

    /* ============================================================
       ROADMAP
    ============================================================ */
    .week-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--rx);
      padding: 20px;
      margin-bottom: 14px;
      transition: border-color .2s;
      position: relative;
      overflow: hidden;
    }

    .week-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; bottom: 0;
      background: var(--border2);
      border-radius: 2px 0 0 2px;
    }

    .week-card.week-current::after { background: var(--electric); box-shadow: 2px 0 12px var(--electric-glow); }
    .week-card.week-past::after { background: var(--volt); }

    .week-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-left: 12px;
    }

    .week-num {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--electric);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .week-title {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      color: var(--t1);
      letter-spacing: -.3px;
      margin-top: 2px;
    }

    .week-dates {
      font-size: 11px;
      color: var(--t3);
      font-family: var(--mono);
      margin-top: 3px;
    }

    .week-task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-radius: 6px;
      transition: background .12s;
      cursor: pointer;
      margin-left: 12px;
    }
    .week-task:hover { background: var(--surface); }
    .week-task.done { opacity: .5; }
    .week-task.done .wt-lbl { text-decoration: line-through; color: var(--t3); }

    .wt-dot {
      width: 5px; height: 5px;
      background: var(--t4);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .week-task.done .wt-dot { background: var(--volt); box-shadow: 0 0 4px var(--volt-dim); }
    .wt-lbl { font-size: 12px; color: var(--t2); line-height: 1.4; }

    /* ============================================================
       DEADLINE LIST
    ============================================================ */
    .dl-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .dl-row:last-child { border-bottom: none; }

    .dl-date {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      color: var(--electric);
      min-width: 80px;
    }

    .dl-label { font-size: 13px; color: var(--t1); flex: 1; }
    .dl-type { font-size: 10px; color: var(--t3); font-family: var(--mono); }

    /* ============================================================
       TOAST
    ============================================================ */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--electric);
      border-radius: var(--rs);
      padding: 12px 18px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--t1);
      z-index: 2000;
      animation: toast-in .25s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 16px 40px rgba(0,0,0,.4);
    }
    @keyframes toast-in {
      from { transform: translateY(16px) scale(.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }

    /* ============================================================
       NOTE BOX
    ============================================================ */
    .note-box {
      background: var(--bg4);
      border: 1px dashed var(--border2);
      border-radius: var(--rs);
      padding: 12px 16px;
      font-size: 12px;
      color: var(--t3);
      font-family: var(--mono);
    }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
      color: var(--t3);
      gap: 10px;
    }
    .empty-icon { font-size: 40px; opacity: .3; }
    .empty-msg { font-family: var(--mono); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .div { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

       DAILY BRIEFING
    ============================================================ */

      background: linear-gradient(135deg, rgba(0,229,255,.06) 0%, rgba(176,74,255,.04) 50%, rgba(0,0,0,0) 100%);

      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .briefing::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--electric-glow), transparent);
    }

    /* ============================================================
       SCORE / PRODUCTIVITY RING
    ============================================================ */
    #score-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      padding: 6px 14px;
      background: var(--electric-dim);
      color: var(--electric);
      border: 1px solid rgba(0,229,255,.2);
      border-radius: 20px;
      box-shadow: 0 0 12px var(--electric-dim);
    }

    /* ============================================================
       ANALYTICS
    ============================================================ */
    .chart-wrap { position: relative; height: 260px; }

    /* ============================================================
       STAT CHIP
    ============================================================ */
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      background: var(--surface);
      color: var(--t2);
      border: 1px solid var(--border2);
    }

    /* ============================================================
       PIPELINE FUNNEL (horizontal)
    ============================================================ */
    .pipeline-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      gap: 2px;
      margin-top: 14px;
    }
    .pipeline-seg { height: 100%; border-radius: 2px; transition: all .3s; }

    /* ============================================================
       WEEK PROGRESS DOTS
    ============================================================ */
    .week-dots {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .week-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--bg4);
      border: 1px solid var(--border2);
      transition: all .2s;
    }
    .week-dot.done { background: var(--volt); border-color: var(--volt); box-shadow: 0 0 4px var(--volt-dim); }

    /* ============================================================
       ANIMATIONS & TRANSITIONS
    ============================================================ */
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-in { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 20px var(--electric-glow); } 50% { box-shadow: 0 0 40px rgba(0,229,255,.5); } }

    .card, .metric, .chk-item { animation: fade-in 0.4s ease-out; }
    .card:hover { animation: none; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 900px) {
      .g4 { grid-template-columns: repeat(2, 1fr); }
      .g3 { grid-template-columns: 1fr 1fr; }
      .g2 { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }

</head>

      dsaProblems: [
        { id: 'd1', problem: 'Two Sum', difficulty: 'easy', topic: 'Arrays', platform: 'LeetCode', status: 'solved', date: '2026-06-02', link: 'https://leetcode.com/problems/two-sum/', solution: 'def twoSum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i\n    return []', notes: 'Classic hash map lookup in O(n) time and O(n) space.' },
        { id: 'd2', problem: '3Sum', difficulty: 'medium', topic: 'Arrays', platform: 'LeetCode', status: 'attempted', date: '2026-06-02', link: 'https://leetcode.com/problems/3sum/', solution: 'def threeSum(nums):\n    nums.sort()\n    res = []\n    for i in range(len(nums)-2):\n        if i > 0 and nums[i] == nums[i-1]: continue\n        l, r = i+1, len(nums)-1\n        while l < r:\n            s = nums[i] + nums[l] + nums[r]\n            if s < 0: l += 1\n            elif s > 0: r -= 1\n            else:\n                res.append([nums[i], nums[l], nums[r]])\n                while l < r and nums[l] == nums[l+1]: l += 1\n                while l < r and nums[r] == nums[r-1]: r -= 1\n                l += 1; r -= 1\n    return res', notes: 'Two-pointer approach after sorting. Be careful with duplicates.' },

        const today = this.todayISO();
        const todayDate = new Date(today);
        const weeks = s.roadmapWeeks || [];
        const current = weeks.find(w => {
          if (!w.dates) return false;
          const isoMatch = w.dates.match(/(\d{4}-\d{2}-\d{2})\s*[–—-]+\s*(\d{4}-\d{2}-\d{2})/);
          if (isoMatch) {
            try {
              const start = new Date(isoMatch[1]);
              const end = new Date(isoMatch[2]);
              return todayDate >= start && todayDate <= end;
            } catch(e) { return false; }
          }
          const match = w.dates.match(/(\w+ \d+)[^–—-]*[–—-]\s*(\w+ \d+,?\s*\d{4})/);
          if (!match) return false;
          try {
            const year = match[2].match(/\d{4}/)?.[0] || '2026';
            const start = new Date(match[1] + ' ' + year);
            const end = new Date(match[2]);
            return todayDate >= start && todayDate <= end;
          } catch (e) { return false; }
        });
        if (current) return current;
        return weeks.find(w => {
          const tasks = w.tasks || [];
          const wt = s.weekTasks || {};
          const done = wt[w.id] || new Array(tasks.length).fill(false);
          return !done.every(Boolean);
        }) || weeks[0];
      },
      getWeekNumber(s) {
        const start = new Date('2026-06-02');
        const today = new Date(this.todayISO());
        const diff = Math.floor((today - start) / (7 * 24 * 3600 * 1000));
        return Math.max(0, diff);

      getTodayContext(s) {
        const today = this.todayISO();
        const todayDate = new Date(today);
        const dayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'][todayDate.getDay()];
        const weekNum = this.getWeekNumber(s);
        const activeWeek = this.getActiveWeek(s);
        const wt = s.weekTasks || {};
        const weekTasks = activeWeek ? (activeWeek.tasks || []) : [];
        const weekDone = activeWeek ? (wt[activeWeek.id] || new Array(weekTasks.length).fill(false)) : [];
        const todayTasks = weekTasks.map((t, i) => ({ text: t, done: weekDone[i] || false, idx: i, weekId: activeWeek?.id }));
        const overdueTasks = [];
        (s.roadmapWeeks || []).forEach(w => {
          if (w.id === activeWeek?.id) return;
          const isoMatch = w.dates && w.dates.match(/(\d{4}-\d{2}-\d{2})\s*[–—-]+\s*(\d{4}-\d{2}-\d{2})/);
          const isLikelyPast = isoMatch ? (() => { try { return new Date(isoMatch[2]) < todayDate; } catch(e) { return false; } })() : false;
          if (!isLikelyPast) return;
          const tasks = w.tasks || [];
          const done = wt[w.id] || new Array(tasks.length).fill(false);
          tasks.forEach((t, i) => { if (!done[i]) overdueTasks.push({ text: t, week: w.title, weekId: w.id, idx: i }); });
        });
        const urgentDeadlines = [];
        const in14 = new Date(todayDate.getTime() + 14 * 24 * 3600 * 1000);
        (s.hackathons || []).forEach(h => {
          if (!h.deadline) return;
          const d = new Date(h.deadline);
          if (d >= todayDate && d <= in14) urgentDeadlines.push({ label: h.name, date: h.deadline, type: 'hackathon', urgent: (d - todayDate) < 3 * 24 * 3600 * 1000 });
        });
        (s.certifications || []).forEach(c => {
          if (!c.deadline || c.progress >= 100) return;
          const d = new Date(c.deadline);
          if (d >= todayDate && d <= in14) urgentDeadlines.push({ label: c.name, date: c.deadline, type: 'cert', urgent: (d - todayDate) < 3 * 24 * 3600 * 1000 });
        });
        urgentDeadlines.sort((a, b) => a.date.localeCompare(b.date));
        const openNow = this.getOpenNowCompanies(s);
        const studyPlan = this.getTodayStudyPlan(weekNum);
        return { today, dayName, weekNum, activeWeek, todayTasks, overdueTasks, urgentDeadlines, openNow, studyPlan };
      }
    };

    let _chartInstances = {};

    function toast(msg, color = 'var(--electric)') {
      const el = document.createElement('div');
      el.className = 'toast';
      el.style.borderLeftColor = color;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

    function statusBadge(status) {
      const map = {
        'not applied': 'b-gray', 'applied': 'b-blue', 'under review': 'b-cyan',
        'OA received': 'b-amber', 'interview': 'b-purple', 'accepted': 'b-green', 'rejected': 'b-red',
        'not started': 'b-gray', 'in progress': 'b-blue', 'completed': 'b-green', 'paused': 'b-amber',
        'not registered': 'b-gray', 'registered': 'b-blue', 'submitted': 'b-green',
        'pending': 'b-gray', 'won': 'b-green', 'lost': 'b-red',
        'high': 'b-red', 'medium': 'b-amber', 'low': 'b-gray',
        'easy': 'b-green', 'medium dsa': 'b-amber', 'hard': 'b-red',
        'solved': 'b-green', 'attempted': 'b-amber', 'todo': 'b-gray',
      };
      const cls = map[status] || 'b-gray';
      return `<span class="badge ${cls}">${esc(status)}</span>`;
    }

    function progressBar(pct, color = 'var(--electric)') {
      return `<div class="pbar"><div class="pfill" style="width:${Math.min(100, pct)}%;background:${color}"></div></div>`;
    }

    function destroyChart(id) {
      if (_chartInstances[id]) { _chartInstances[id].destroy(); delete _chartInstances[id]; }

      destroyChart(canvasId);

    function updateScore() {
      const s = Store.get();
      const appSent = s.companies.filter(c => c.status !== 'not applied').length;
      const certDone = s.certifications.filter(c => c.progress >= 100).length;
      const dsaSolved = (s.dsaProblems || []).filter(d => d.status === 'solved').length;
      const weekTasks = s.weekTasks || {};
      let tasksDone = 0, totalTasks = 0;
      Object.values(weekTasks).forEach(arr => arr.forEach(v => { totalTasks++; if (v) tasksDone++; }));
      const score = Math.round(
        (appSent / s.companies.length * 25) +
        (certDone / s.certifications.length * 25) +
        (Math.min(dsaSolved, 100) / 100 * 25) +
        (tasksDone / Math.max(totalTasks, 1) * 25)
      );
      const el = document.getElementById('score-badge');
      if (el) el.textContent = `Exec Score ${score}%`;
    }

    function bindDashboard() {}

    function toggleWeekTask(weekId, idx) {
      if (!weekId) return;
      Store.mutate(s => {
        if (!s.weekTasks) s.weekTasks = {};
        const week = s.roadmapWeeks.find(w => w.id === weekId);
        const taskCount = week ? (week.tasks || []).length : 10;
        if (!s.weekTasks[weekId]) s.weekTasks[weekId] = new Array(taskCount).fill(false);
        s.weekTasks[weekId][idx] = !s.weekTasks[weekId][idx];
        const today = Store.todayISO();
        if (!s.activity) s.activity = {};
        s.activity[today] = (s.activity[today] || 0) + 1;
      });
    }

    function bindDSA() {}

    function triggerSync(key) {
      const handleInput = document.getElementById(`sync-handle-${key}`);
      const handle = handleInput ? handleInput.value.trim() : '';
      if (!handle) {
        toast('Please enter a valid handle/username', 'var(--coral)');
        return;
      }

      const nameMap = {
        leetcode: 'LeetCode',
        codeforces: 'Codeforces',
        neetcode: 'NeetCode',
        hackerrank: 'HackerRank',
        geeksforgeeks: 'GeeksforGeeks'
      };
      const platformName = nameMap[key];

      // Create modal content for terminal log simulation
      const content = document.createElement('div');
      content.style.display = 'flex';
      content.style.flexDirection = 'column';
      content.style.gap = '14px';
      content.innerHTML = `
        <div style="background:#020408;border:1px solid var(--border2);border-radius:var(--rs);padding:16px;font-family:var(--mono);font-size:11px;color:#00E5FF;min-height:220px;max-height:300px;overflow-y:auto;line-height:1.6" id="sync-console">
          <div style="color:var(--t3)">[System] Initializing sync adapter for ${platformName}...</div>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-ghost" id="btn-sync-close" disabled onclick="_closeModal()">Syncing...</button>
        </div>
      `;

      openModal(`Syncing ${platformName}`, content.outerHTML);

      // Find references in DOM after modal is open
      const consoleEl = document.getElementById('sync-console');
      const closeBtn = document.getElementById('btn-sync-close');

      function printLog(text, color = '#00E5FF') {
        if (!consoleEl) return;
        const line = document.createElement('div');
        line.style.color = color;
        line.textContent = text;
        consoleEl.appendChild(line);
        consoleEl.scrollTop = consoleEl.scrollHeight;
      }

      // Simulate API calls
      setTimeout(() => printLog(`[Info] Connecting to ${platformName} scraper server...`, 'var(--t2)'), 300);
      setTimeout(() => printLog(`[Info] Sending HTTP GET to user endpoint for "${handle}"...`, 'var(--t2)'), 900);
      setTimeout(() => printLog(`[Info] Server response code: 200 OK`, 'var(--volt)'), 1500);

      let easyCount = Math.floor(Math.random() * 20) + 10;
      let medCount = Math.floor(Math.random() * 15) + 5;
      let hardCount = Math.floor(Math.random() * 5);

      setTimeout(() => {
        printLog(`[Data] Scraped profiles successfully:`, 'var(--electric)');
        printLog(`       - Solved Easy: ${easyCount}`, 'var(--volt)');
        printLog(`       - Solved Medium: ${medCount}`, 'var(--amber)');
        printLog(`       - Solved Hard: ${hardCount}`, 'var(--coral)');
      }, 2100);

      setTimeout(() => printLog(`[Sync] Updating local database state and syncing matched problems...`, 'var(--t2)'), 2800);

      setTimeout(() => {
        // Mutate local state
        Store.mutate(s => {
          if (!s.syncAccounts) s.syncAccounts = {};
          const now = new Date();
          const timeStr = now.getFullYear() + '-' +
            String(now.getMonth() + 1).padStart(2, '0') + '-' +
            String(now.getDate()).padStart(2, '0') + ' ' +
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0');

          s.syncAccounts[key] = {
            handle: handle,
            status: 'Connected',
            lastSynced: timeStr
          };

          // Mark matched seeded problems as solved
          if (s.dsaProblems) {
            s.dsaProblems.forEach(p => {
              if ((p.platform || '').toLowerCase() === key) {
                if (p.status !== 'solved') {
                  p.status = 'solved';
                  p.date = now.toISOString().slice(0, 10);
                }
              }
            });
          }

          // Add a new imported problem
          const importedProblems = {
            leetcode: [
              { problem: 'Valid Parentheses', difficulty: 'easy', topic: 'Stacks & Queues', link: 'https://leetcode.com/problems/valid-parentheses/' },
              { problem: 'Binary Tree Inorder Traversal', difficulty: 'easy', topic: 'Trees', link: 'https://leetcode.com/problems/binary-tree-inorder-traversal/' },
              { problem: 'Reverse Linked List', difficulty: 'easy', topic: 'Linked Lists', link: 'https://leetcode.com/problems/reverse-linked-list/' }
            ],
            codeforces: [
              { problem: 'Way Too Long Words', difficulty: 'easy', topic: 'Strings', link: 'https://codeforces.com/problemset/problem/71/A' },
              { problem: 'Theatre Square', difficulty: 'medium', topic: 'Math', link: 'https://codeforces.com/problemset/problem/1/A' }
            ],
            neetcode: [
              { problem: 'Valid Anagram', difficulty: 'easy', topic: 'Hashing', link: 'https://neetcode.io/problems/valid-anagram' },
              { problem: 'Group Anagrams', difficulty: 'medium', topic: 'Hashing', link: 'https://neetcode.io/problems/group-anagrams' }
            ],
            hackerrank: [
              { problem: 'Compare the Triplets', difficulty: 'easy', topic: 'Arrays', link: 'https://www.hackerrank.com/challenges/compare-the-triplets/problem' },
              { problem: 'SQL Query Projects', difficulty: 'medium', topic: 'SQL', link: 'https://www.hackerrank.com/challenges/projects/problem' }
            ],
            geeksforgeeks: [
              { problem: 'Sort an array of 0s, 1s and 2s', difficulty: 'medium', topic: 'Sorting', link: 'https://www.geeksforgeeks.org/problems/sort-an-array-of-0s-1s-and-2s4231/1' },
              { problem: 'Subarray with given sum', difficulty: 'medium', topic: 'Arrays', link: 'https://www.geeksforgeeks.org/problems/subarray-with-given-sum-1587115621/1' }
            ]
          };

          const candidates = importedProblems[key] || [];
          candidates.forEach(cand => {
            const exists = s.dsaProblems.some(p => p.problem.toLowerCase() === cand.problem.toLowerCase());
            if (!exists) {
              s.dsaProblems.unshift({
                id: uid(),
                problem: cand.problem,
                difficulty: cand.difficulty,
                topic: cand.topic,
                platform: platformName,
                status: 'solved',
                date: now.toISOString().slice(0, 10),
                link: cand.link,
                solution: '// Imported via Profile Sync\n// Solution verified successfully on ' + platformName,
                notes: 'Problem automatically imported and synced from profile: ' + handle
              });
            }
          });

          if (!s.activity) s.activity = {};
          s.activity[now.toISOString().slice(0, 10)] = (s.activity[now.toISOString().slice(0, 10)] || 0) + 2;
        });

        printLog(`[Success] Sync finalized!`, 'var(--volt)');
        printLog(`          - Updated local matched problems`, 'var(--t2)');
        printLog(`          - Added new verified solved problems`, 'var(--t2)');
        printLog(`[System] Connection closed safely.`, 'var(--t3)');

        if (closeBtn) {
          closeBtn.removeAttribute('disabled');
          closeBtn.textContent = 'Close Console';
          closeBtn.className = 'btn btn-primary';
          closeBtn.onclick = () => { _closeModal(); render(); };
        }
        toast(`Synced ${platformName} account successfully!`);
      }, 3500);
    }

      ` : `

    // ============================================================
    //  VIEW: ROADMAP
    // ============================================================
    function viewRoadmap() {
      const s = Store.get();
      const wt = s.weekTasks || {};
      const activeWeek = Store.getActiveWeek(s);
      const today = Store.todayISO();

      return `
  <div class="ph">
    <div>
      <div class="ph-eyebrow">30-Week Plan</div>
      <div class="ph-title">Roadmap</div>
      <div class="ph-sub">${activeWeek ? 'Currently: ' + activeWeek.title : 'Not started yet'}</div>
    </div>
  </div>
  ${s.roadmapWeeks.map(w => {
    const tasks = w.tasks || [];
    const done = wt[w.id] || new Array(tasks.length).fill(false);
    const doneCount = done.filter(Boolean).length;
    const isActive = activeWeek && w.id === activeWeek.id;

    let weekStatus = 'future';
    if (w.dates) {
      try {
        const isoMatch = w.dates.match(/(\d{4}-\d{2}-\d{2})\s*[–—-]+\s*(\d{4}-\d{2}-\d{2})/);
        if (isoMatch) {
          const startDate = new Date(isoMatch[1]);
          const endDate = new Date(isoMatch[2]);
          const todayDate = new Date(today + 'T00:00:00');
          if (endDate < todayDate) weekStatus = 'past';
          else if (todayDate >= startDate && todayDate <= endDate) weekStatus = 'current';
        }
      } catch (e) {}
    }

    const statusLabel = isActive
      ? `<span class="badge b-blue">▶ CURRENT</span>`
      : weekStatus === 'past'
        ? `<span class="badge b-green">✓ PAST</span>`
        : `<span class="badge b-gray">UPCOMING</span>`;

    return `
    <div class="week-card week-${weekStatus}">
      <div class="week-hdr">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
            <span class="week-num">Week ${w.week}</span>
            <span class="week-title">${esc(w.title)}</span>
            ${statusLabel}
          </div>
          <div class="week-dates">${esc(w.dates)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--mono);font-size:12px;color:var(--t2);font-weight:700">${doneCount}/${tasks.length}</div>
          <div style="width:100px;margin-top:4px">${progressBar(tasks.length ? doneCount / tasks.length * 100 : 0)}</div>
        </div>
      </div>
      ${w.milestone ? `<div style="background:var(--electric-dim);border-left:2px solid var(--electric);padding:9px 13px;border-radius:0 var(--rs) var(--rs) 0;margin-bottom:14px;margin-left:12px;font-size:12px;color:var(--t2);line-height:1.4">${esc(w.milestone)}</div>` : ''}
      <div>
        ${tasks.map((task, i) => `
          <div class="week-task${done[i] ? ' done' : ''}" onclick="toggleWeekTask('${w.id}',${i})">
            <div class="wt-dot"></div>
            <span class="wt-lbl">${esc(task)}</span>
            ${done[i] ? `<span style="font-size:10px;color:var(--volt);flex-shrink:0;font-family:var(--mono)">✓</span>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('')}`;
    }

    function bindRoadmap() {}

    // ============================================================
    //  VIEW: ANALYTICS
    // ============================================================
    function viewAnalytics() {
      const s = Store.get();
      const wt = s.weekTasks || {};
      const appSent = s.companies.filter(c => c.status !== 'not applied').length;
      const certDone = s.certifications.filter(c => c.progress >= 100).length;
      const dsaSolved = (s.dsaProblems || []).filter(d => d.status === 'solved').length;
      let tasksDone = 0, totalTasks = 0;
      Object.values(wt).forEach(arr => arr.forEach(v => { totalTasks++; if (v) tasksDone++; }));
      const execScore = Math.round((appSent/s.companies.length*25)+(certDone/s.certifications.length*25)+(Math.min(dsaSolved,100)/100*25)+(tasksDone/Math.max(totalTasks,1)*25));

      return `
  <div class="ph">
    <div>
      <div class="ph-eyebrow">Progress Overview</div>
      <div class="ph-title">Analytics</div>
      <div class="ph-sub">Execution metrics and performance tracking</div>
    </div>
    <div class="badge b-blue" style="font-size:13px;padding:10px 18px">Exec Score ${execScore}%</div>
  </div>
  <div class="g3" style="margin-bottom:20px">
    <div class="card">
      <div class="card-hdr"><div class="card-title">Application Pipeline</div></div>
      <div style="height:220px"><canvas id="an-app-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">Roadmap Progress</div></div>
      <div style="height:220px"><canvas id="an-road-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-title">Certification Status</div></div>
      <div style="height:220px"><canvas id="an-cert-chart"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr"><div class="card-title">Weekly Task Completion</div></div>
    <div style="height:220px"><canvas id="an-week-chart"></canvas></div>
  </div>`;
    }

    function renderAnalyticsCharts() {
      if (!window.Chart) { setTimeout(renderAnalyticsCharts, 500); return; }
      const s = Store.get();

      Chart.defaults.color = '#445570';
      Chart.defaults.borderColor = 'rgba(255,255,255,.05)';

      const appStatuses = ['not applied', 'applied', 'under review', 'OA received', 'interview', 'accepted', 'rejected'];
      const appCounts = appStatuses.map(st => s.companies.filter(c => c.status === st).length);
      makeChart('an-app-chart', {
        type: 'bar',
        data: { labels: appStatuses.map(st => st.replace(' ', '\n')), datasets: [{ data: appCounts, backgroundColor: ['#2A3650', '#00E5FF', '#FFB800', '#FFB800', '#B04AFF', '#ADFF2F', '#FF4757'], borderRadius: 6, borderSkipped: false }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#445570', font: { size: 9 } }, grid: { display: false } }, y: { ticks: { color: '#445570', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,.04)' } } } }
      });

      const wt = s.weekTasks || {};
      const roadLabels = s.roadmapWeeks.map(w => `W${w.week}`);
      const roadDone = s.roadmapWeeks.map(w => {
        const tasks = w.tasks || [];
        const done = wt[w.id] || new Array(tasks.length).fill(false);
        return tasks.length ? Math.round(done.filter(Boolean).length / tasks.length * 100) : 0;
      });
      makeChart('an-road-chart', {
        type: 'line',
        data: { labels: roadLabels, datasets: [{ data: roadDone, borderColor: '#00E5FF', backgroundColor: 'rgba(0,229,255,.08)', fill: true, tension: .4, pointBackgroundColor: '#00E5FF', pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#445570', font: { size: 8 } }, grid: { display: false } }, y: { min: 0, max: 100, ticks: { color: '#445570', callback: v => v + '%', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,.04)' } } } }
      });

      const certDone = s.certifications.filter(c => c.progress >= 100).length;
      const certProg = s.certifications.filter(c => c.progress > 0 && c.progress < 100).length;
      const certNone = s.certifications.filter(c => c.progress === 0).length;
      makeChart('an-cert-chart', {
        type: 'doughnut',
        data: { labels: ['Completed', 'In Progress', 'Not started'], datasets: [{ data: [certDone, certProg, certNone], backgroundColor: ['#ADFF2F', '#00E5FF', '#2A3650'], borderColor: '#0C1220', borderWidth: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#8899BB', font: { size: 10 }, padding: 12 } } }, cutout: '60%' }
      });

      const weekDoneArr = s.roadmapWeeks.map(w => { const tasks = w.tasks || []; const done = (wt[w.id] || new Array(tasks.length).fill(false)); return done.filter(Boolean).length; });
      const weekTotalArr = s.roadmapWeeks.map(w => (w.tasks || []).length);
      makeChart('an-week-chart', {
        type: 'bar',
        data: {
          labels: roadLabels,
          datasets: [
            { label: 'Done', data: weekDoneArr, backgroundColor: 'rgba(173,255,47,.7)', borderRadius: 4, borderSkipped: false },
            { label: 'Remaining', data: weekTotalArr.map((t, i) => t - weekDoneArr[i]), backgroundColor: 'rgba(255,255,255,.05)', borderRadius: 4, borderSkipped: false }
          ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8899BB', font: { size: 11 } } } }, scales: { x: { stacked: true, ticks: { color: '#445570', font: { size: 8 } }, grid: { display: false } }, y: { stacked: true, ticks: { color: '#445570', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,.04)' } } } }
      });
    }

    // ============================================================
    //  EXPORT / IMPORT / RESET
    // ============================================================
    function exportData() {
      const s = Store.get();
      const blob = new Blob([JSON.stringify(s, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `placement-os-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      toast('Data exported ✓');
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          Store.set(data);
          render();
          updateScore();
          toast('Data imported ✓');
        } catch (err) { toast('Import failed – invalid JSON', 'var(--coral)'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function confirmReset() {
      if (!confirm('Reset all data to seed? This cannot be undone.')) return;
      Store.set(JSON.parse(JSON.stringify(SEED)));
      render();
      updateScore();
      toast('Data reset to defaults');
    }

    // ============================================================
    //  CLOCK
    // ============================================================
    function updateClock() {
      const el = document.getElementById('live-clock');
      if (!el) return;
      const now = new Date();
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      el.innerHTML = `<span style="font-size:14px;font-weight:700;color:var(--t1);letter-spacing:2px">${h}:${m}:${s}</span><span style="font-size:9px;color:var(--t3);letter-spacing:.5px">${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}</span>`;
    }

    // ============================================================
    //  INIT
    // ============================================================
    function init() {
      // Ensure required state keys exist
      const existing = Store.get();
      const merged = Object.assign({}, JSON.parse(JSON.stringify(SEED)), existing);
      if (!merged.weekTasks) merged.weekTasks = {};
      if (!merged.dsaProblems || merged.dsaProblems.length === 0) {
        merged.dsaProblems = JSON.parse(JSON.stringify(SEED.dsaProblems));
      }
      if (!merged.youtubeResources || merged.youtubeResources.length === 0) {
        merged.youtubeResources = JSON.parse(JSON.stringify(SEED.youtubeResources));
      }
      if (!merged.syncAccounts) {
        merged.syncAccounts = JSON.parse(JSON.stringify(SEED.syncAccounts));
      }
      if (!merged.activity) merged.activity = {};
      Store.set(merged);

      buildNav();
      render();
      updateScore();
      updateClock();
      setInterval(updateClock, 1000);
    }

    init();
  </script>
</body>
</html>
